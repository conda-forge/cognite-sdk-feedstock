{% set name = "cognite-sdk" %}
{% set version = "8.0.6" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cognite_sdk-{{ version }}.tar.gz
  sha256: e147d7043bb2761cf927cebdd6e5c71af40165fac9ee47856270f6b2c8a2ad6f

build:
  noarch: python
  preserve_egg_dir: yes
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }}
    # TODO: Remove requests and requests-oauthlib once v7 support is dropped
    - requests >=2.27.0,<3.0.0
    - requests-oauthlib >=1.0.0,<2.0.0  # # TODO: bump to <3 (need 1 more minor v7 version first)
    - httpx >=0,<1
    - msal >=1.31.0,<2.0.0
    - authlib >=1.0.0,<2.0.0
    - packaging >=20.0.0
    - protobuf >=4.0.0
    - pip >=20.0.0
    - typing_extensions >=4
    - python-tzdata >=2024.1
    - numpy >=1.25.0
    - pandas >=2.1.0
  run_constrained:
    - geopandas >=0.14.0
    - shapely >=1.7.0
    - PyYAML >=6.0.0,<7.0.0
    - sympy >=0

test:
  imports:
    - cognite.client
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/cognitedata/cognite-sdk-python
  summary: Cognite Python SDK
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - haakonvt
